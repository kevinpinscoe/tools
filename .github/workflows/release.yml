name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write   # required for Sigstore OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable   # no root go.mod; each tool has its own

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Notify apt repo
        run: |
          gh api repos/kevinpinscoe/apt/dispatches \
            --method POST \
            --field event_type=new-release \
            --field client_payload[repo]="${{ github.repository }}" \
            --field client_payload[tag]="${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}

      - name: Notify rpm repo
        run: |
          gh api repos/kevinpinscoe/rpm/dispatches \
            --method POST \
            --field event_type=new-release \
            --field client_payload[repo]="${{ github.repository }}" \
            --field client_payload[tag]="${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
