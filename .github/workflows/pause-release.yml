name: Release pause

on:
  push:
    tags:
      - 'pause-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: pause-source/go.mod

      - name: Build binaries
        working-directory: pause-source
        run: |
          GOOS=linux  GOARCH=amd64 go build -o pause-linux-amd64  .
          GOOS=linux  GOARCH=arm64 go build -o pause-linux-arm64  .
          GOOS=darwin GOARCH=arm64 go build -o pause-darwin-arm64 .
          sha256sum \
            pause-linux-amd64 \
            pause-linux-arm64 \
            pause-darwin-arm64 \
            > checksums.txt

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksums
        working-directory: pause-source
        run: |
          cosign sign-blob --yes \
            --bundle checksums.txt.bundle \
            checksums.txt

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            pause-source/pause-linux-amd64
            pause-source/pause-linux-arm64
            pause-source/pause-darwin-arm64
            pause-source/checksums.txt
            pause-source/checksums.txt.bundle
