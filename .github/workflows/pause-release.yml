name: Release pause

on:
  push:
    tags:
      - 'pause-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: pause-source/go.mod

      - name: Build binaries
        working-directory: pause-source
        run: |
          GOOS=linux  GOARCH=amd64 go build -o pause-linux-amd64  .
          GOOS=linux  GOARCH=arm64 go build -o pause-linux-arm64  .
          GOOS=darwin GOARCH=arm64 go build -o pause-darwin-arm64 .
          sha256sum \
            pause-linux-amd64 \
            pause-linux-arm64 \
            pause-darwin-arm64 \
            > checksums.txt

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksums
        working-directory: pause-source
        run: |
          cosign sign-blob --yes \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            pause-source/pause-linux-amd64
            pause-source/pause-linux-arm64
            pause-source/pause-darwin-arm64
            pause-source/checksums.txt
            pause-source/checksums.txt.sig
            pause-source/checksums.txt.pem
