name: Release check-git-branch

on:
  push:
    tags:
      - 'check-git-branch-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: check-git-branch-source/go.mod

      - name: Build binaries
        working-directory: check-git-branch-source
        run: |
          GOOS=linux  GOARCH=amd64 go build -o check-git-branch-linux-amd64  .
          GOOS=linux  GOARCH=arm64 go build -o check-git-branch-linux-arm64  .
          GOOS=darwin GOARCH=arm64 go build -o check-git-branch-darwin-arm64 .
          sha256sum \
            check-git-branch-linux-amd64 \
            check-git-branch-linux-arm64 \
            check-git-branch-darwin-arm64 \
            > checksums.txt

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksums
        working-directory: check-git-branch-source
        run: |
          cosign sign-blob --yes \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            check-git-branch-source/check-git-branch-linux-amd64
            check-git-branch-source/check-git-branch-linux-arm64
            check-git-branch-source/check-git-branch-darwin-arm64
            check-git-branch-source/checksums.txt
            check-git-branch-source/checksums.txt.sig
            check-git-branch-source/checksums.txt.pem
