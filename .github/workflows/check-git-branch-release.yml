name: Release check-git-branch

on:
  push:
    tags:
      - 'check-git-branch-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing check-git-branch-vX.Y.Z tag to (re)build packages for, e.g. to backfill apt/rpm'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Resolve tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#check-git-branch-v}" >> "$GITHUB_ENV"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: check-git-branch-source/go.mod

      - name: Build binaries
        working-directory: check-git-branch-source
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION}"
          GOOS=linux  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o check-git-branch-linux-amd64  .
          GOOS=linux  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o check-git-branch-linux-arm64  .
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o check-git-branch-darwin-arm64 .
          sha256sum \
            check-git-branch-linux-amd64 \
            check-git-branch-linux-arm64 \
            check-git-branch-darwin-arm64 \
            > checksums.txt

      - name: Install nfpm
        run: |
          NFPM_VER=2.47.0
          NFPM_TGZ="nfpm_${NFPM_VER}_Linux_x86_64.tar.gz"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/checksums.txt" \
            -o "/tmp/nfpm_checksums.txt"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/${NFPM_TGZ}" \
            -o "/tmp/${NFPM_TGZ}"
          (cd /tmp && grep "${NFPM_TGZ}$" nfpm_checksums.txt | sha256sum -c)
          sudo tar -xzf "/tmp/${NFPM_TGZ}" -C /usr/local/bin nfpm

      - name: Build .deb and .rpm packages
        working-directory: check-git-branch-source
        run: |
          for ARCH in amd64 arm64; do
            case "$ARCH" in
              amd64) RPMARCH=x86_64 ;;
              arm64) RPMARCH=aarch64 ;;
            esac
            cat > "nfpm-${ARCH}.yaml" <<EOF
          name: check-git-branch
          arch: ${ARCH}
          version: "${VERSION}"
          vendor: Kevin P. Inscoe
          homepage: https://github.com/kevinpinscoe/tools
          maintainer: "Kevin P. Inscoe <kevin.inscoe@gmail.com>"
          description: Scan git repos for non-default branches or leftover local branches
          license: MIT
          contents:
            - src: ./check-git-branch-linux-${ARCH}
              dst: /usr/bin/check-git-branch
              file_info:
                mode: 0755
          EOF
            nfpm package --config "nfpm-${ARCH}.yaml" --packager deb \
              --target "check-git-branch_${VERSION}_${ARCH}.deb"
            nfpm package --config "nfpm-${ARCH}.yaml" --packager rpm \
              --target "check-git-branch-${VERSION}-1.${RPMARCH}.rpm"
          done

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksums
        working-directory: check-git-branch-source
        run: |
          cosign sign-blob --yes \
            --bundle checksums.txt.bundle \
            checksums.txt

      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            check-git-branch-source/check-git-branch-linux-amd64
            check-git-branch-source/check-git-branch-linux-arm64
            check-git-branch-source/check-git-branch-darwin-arm64
            check-git-branch-source/checksums.txt
            check-git-branch-source/checksums.txt.bundle
            check-git-branch-source/*.deb
            check-git-branch-source/*.rpm

      - name: Notify apt repo
        run: |
          gh api repos/kevinpinscoe/apt/dispatches \
            --method POST \
            --field event_type=new-release \
            --field client_payload[repo]="${{ github.repository }}" \
            --field client_payload[tag]="${{ env.TAG }}"
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}

      - name: Notify rpm repo
        run: |
          gh api repos/kevinpinscoe/rpm/dispatches \
            --method POST \
            --field event_type=new-release \
            --field client_payload[repo]="${{ github.repository }}" \
            --field client_payload[tag]="${{ env.TAG }}"
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}

      - name: Update Homebrew formula
        working-directory: check-git-branch-source
        run: |
          git clone "https://${HOMEBREW_TAP_TOKEN}@github.com/kevinpinscoe/homebrew-tap.git" /tmp/homebrew-tap
          python3 - <<'PYEOF'
          import os, pathlib, re

          tool = "check-git-branch"
          version = os.environ["VERSION"]
          tag = os.environ["TAG"]

          checksums = {}
          for line in pathlib.Path("checksums.txt").read_text().splitlines():
              sha, _, fname = line.partition("  ")
              checksums[fname.strip()] = sha.strip()

          path = pathlib.Path(f"/tmp/homebrew-tap/Formula/{tool}.rb")
          text = path.read_text()
          text = re.sub(r'version "[^"]+"', f'version "{version}"', text, count=1)

          lines = text.splitlines()
          out = []
          i = 0
          while i < len(lines):
              line = lines[i]
              m = re.search(r'/download/[^/]+/(' + re.escape(tool) + r'-\S+)"', line)
              if m and 'url "' in line:
                  binname = m.group(1)
                  sha = checksums.get(binname)
                  line = re.sub(
                      r'/download/[^/]+/' + re.escape(binname) + '"',
                      f'/download/{tag}/{binname}"',
                      line,
                  )
                  out.append(line)
                  i += 1
                  if sha and i < len(lines) and 'sha256 "' in lines[i]:
                      out.append(re.sub(r'sha256 "[^"]+"', f'sha256 "{sha}"', lines[i]))
                      i += 1
                  continue
              out.append(line)
              i += 1

          path.write_text("\n".join(out) + "\n")
          PYEOF
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/check-git-branch.rb"
          git diff --cached --quiet || git commit -m "check-git-branch ${VERSION}"
          git push
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
