name: Release check-git-repos

on:
  push:
    tags:
      - 'check-git-repos-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing check-git-repos-vX.Y.Z tag to (re)build packages for, e.g. to backfill apt/rpm'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Resolve tag
        run: echo "TAG=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_ENV"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: check-git-repos-source/go.mod

      - name: Build binaries
        working-directory: check-git-repos-source
        run: |
          GOOS=linux  GOARCH=amd64 go build -o check-git-repos-linux-amd64  .
          GOOS=linux  GOARCH=arm64 go build -o check-git-repos-linux-arm64  .
          GOOS=darwin GOARCH=arm64 go build -o check-git-repos-darwin-arm64 .
          sha256sum \
            check-git-repos-linux-amd64 \
            check-git-repos-linux-arm64 \
            check-git-repos-darwin-arm64 \
            > checksums.txt

      - name: Install nfpm
        run: |
          NFPM_VER=2.47.0
          NFPM_TGZ="nfpm_${NFPM_VER}_Linux_x86_64.tar.gz"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/checksums.txt" \
            -o "/tmp/nfpm_checksums.txt"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/${NFPM_TGZ}" \
            -o "/tmp/${NFPM_TGZ}"
          (cd /tmp && grep "${NFPM_TGZ}$" nfpm_checksums.txt | sha256sum -c)
          sudo tar -xzf "/tmp/${NFPM_TGZ}" -C /usr/local/bin nfpm

      - name: Build .deb and .rpm packages
        working-directory: check-git-repos-source
        run: |
          VERSION="${TAG#check-git-repos-v}"
          for ARCH in amd64 arm64; do
            case "$ARCH" in
              amd64) RPMARCH=x86_64 ;;
              arm64) RPMARCH=aarch64 ;;
            esac
            cat > "nfpm-${ARCH}.yaml" <<EOF
          name: check-git-repos
          arch: ${ARCH}
          version: "${VERSION}"
          vendor: Kevin P. Inscoe
          homepage: https://github.com/kevinpinscoe/tools
          maintainer: "Kevin P. Inscoe <kevin.inscoe@gmail.com>"
          description: Scan git repositories under a root directory for ahead/behind/diverged/uncommitted state
          license: MIT
          contents:
            - src: ./check-git-repos-linux-${ARCH}
              dst: /usr/bin/check-git-repos
              file_info:
                mode: 0755
          EOF
            nfpm package --config "nfpm-${ARCH}.yaml" --packager deb \
              --target "check-git-repos_${VERSION}_${ARCH}.deb"
            nfpm package --config "nfpm-${ARCH}.yaml" --packager rpm \
              --target "check-git-repos-${VERSION}-1.${RPMARCH}.rpm"
          done

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksums
        working-directory: check-git-repos-source
        run: |
          cosign sign-blob --yes \
            --bundle checksums.txt.bundle \
            checksums.txt

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.TAG }}
          files: |
            check-git-repos-source/check-git-repos-linux-amd64
            check-git-repos-source/check-git-repos-linux-arm64
            check-git-repos-source/check-git-repos-darwin-arm64
            check-git-repos-source/checksums.txt
            check-git-repos-source/checksums.txt.bundle
            check-git-repos-source/*.deb
            check-git-repos-source/*.rpm

      - name: Notify apt repo
        run: |
          gh api repos/kevinpinscoe/apt/dispatches \
            --method POST \
            --field event_type=new-release \
            --field client_payload[repo]="${{ github.repository }}" \
            --field client_payload[tag]="${{ env.TAG }}"
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}

      - name: Notify rpm repo
        run: |
          gh api repos/kevinpinscoe/rpm/dispatches \
            --method POST \
            --field event_type=new-release \
            --field client_payload[repo]="${{ github.repository }}" \
            --field client_payload[tag]="${{ env.TAG }}"
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
