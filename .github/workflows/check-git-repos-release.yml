name: Release check-git-repos

on:
  push:
    tags:
      - 'check-git-repos-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: check-git-repos-source/go.mod

      - name: Build binaries
        working-directory: check-git-repos-source
        run: |
          GOOS=linux  GOARCH=amd64 go build -o check-git-repos-linux-amd64  .
          GOOS=linux  GOARCH=arm64 go build -o check-git-repos-linux-arm64  .
          GOOS=darwin GOARCH=arm64 go build -o check-git-repos-darwin-arm64 .
          sha256sum \
            check-git-repos-linux-amd64 \
            check-git-repos-linux-arm64 \
            check-git-repos-darwin-arm64 \
            > checksums.txt

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksums
        working-directory: check-git-repos-source
        run: |
          cosign sign-blob --yes \
            --bundle checksums.txt.bundle \
            checksums.txt

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            check-git-repos-source/check-git-repos-linux-amd64
            check-git-repos-source/check-git-repos-linux-arm64
            check-git-repos-source/check-git-repos-darwin-arm64
            check-git-repos-source/checksums.txt
            check-git-repos-source/checksums.txt.bundle
