name: Release menu-app

on:
  push:
    tags:
      - 'menu-app-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing menu-app-vX.Y.Z tag to (re)build packages for, e.g. to backfill apt/rpm'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Resolve tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#menu-app-v}" >> "$GITHUB_ENV"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: menu-app-source/go.mod

      - name: Build binaries
        working-directory: menu-app-source
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION}"
          GOOS=linux  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o menu-app-linux-amd64  .
          GOOS=linux  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o menu-app-linux-arm64  .
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o menu-app-darwin-arm64 .
          sha256sum \
            menu-app-linux-amd64 \
            menu-app-linux-arm64 \
            menu-app-darwin-arm64 \
            > checksums.txt

      - name: Install nfpm
        run: |
          NFPM_VER=2.47.0
          NFPM_TGZ="nfpm_${NFPM_VER}_Linux_x86_64.tar.gz"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/checksums.txt" \
            -o "/tmp/nfpm_checksums.txt"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/${NFPM_TGZ}" \
            -o "/tmp/${NFPM_TGZ}"
          (cd /tmp && grep "${NFPM_TGZ}$" nfpm_checksums.txt | sha256sum -c)
          sudo tar -xzf "/tmp/${NFPM_TGZ}" -C /usr/local/bin nfpm

      - name: Build .deb and .rpm packages
        working-directory: menu-app-source
        run: |
          for ARCH in amd64 arm64; do
            case "$ARCH" in
              amd64) RPMARCH=x86_64 ;;
              arm64) RPMARCH=aarch64 ;;
            esac
            cat > "nfpm-${ARCH}.yaml" <<EOF
          name: menu-app
          arch: ${ARCH}
          version: "${VERSION}"
          vendor: Kevin P. Inscoe
          homepage: https://github.com/kevinpinscoe/tools
          maintainer: "Kevin P. Inscoe <kevin.inscoe@gmail.com>"
          description: Run repository scripts from a simple TUI menu
          license: MIT
          contents:
            - src: ./menu-app-linux-${ARCH}
              dst: /usr/bin/menu-app
              file_info:
                mode: 0755
          EOF
            nfpm package --config "nfpm-${ARCH}.yaml" --packager deb \
              --target "menu-app_${VERSION}_${ARCH}.deb"
            nfpm package --config "nfpm-${ARCH}.yaml" --packager rpm \
              --target "menu-app-${VERSION}-1.${RPMARCH}.rpm"
          done

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksums
        working-directory: menu-app-source
        run: |
          cosign sign-blob --yes \
            --bundle checksums.txt.bundle \
            checksums.txt

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.TAG }}
          files: |
            menu-app-source/menu-app-linux-amd64
            menu-app-source/menu-app-linux-arm64
            menu-app-source/menu-app-darwin-arm64
            menu-app-source/checksums.txt
            menu-app-source/checksums.txt.bundle
            menu-app-source/*.deb
            menu-app-source/*.rpm

      - name: Notify apt repo
        run: |
          gh api repos/kevinpinscoe/apt/dispatches \
            --method POST \
            --field event_type=new-release \
            --field client_payload[repo]="${{ github.repository }}" \
            --field client_payload[tag]="${{ env.TAG }}"
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}

      - name: Notify rpm repo
        run: |
          gh api repos/kevinpinscoe/rpm/dispatches \
            --method POST \
            --field event_type=new-release \
            --field client_payload[repo]="${{ github.repository }}" \
            --field client_payload[tag]="${{ env.TAG }}"
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}

      - name: Update Homebrew formula
        working-directory: menu-app-source
        run: |
          git clone "https://${HOMEBREW_TAP_TOKEN}@github.com/kevinpinscoe/homebrew-tap.git" /tmp/homebrew-tap
          python3 - <<'PYEOF'
          import os, pathlib, re

          tool = "menu-app"
          version = os.environ["VERSION"]
          tag = os.environ["TAG"]

          checksums = {}
          for line in pathlib.Path("checksums.txt").read_text().splitlines():
              sha, _, fname = line.partition("  ")
              checksums[fname.strip()] = sha.strip()

          path = pathlib.Path(f"/tmp/homebrew-tap/Formula/{tool}.rb")

          if not path.exists():
              path.write_text(f'''# frozen_string_literal: true

          class MenuApp < Formula
            desc "Run repository scripts from a simple TUI menu"
            homepage "https://github.com/kevinpinscoe/tools"
            version "{version}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/kevinpinscoe/tools/releases/download/{tag}/menu-app-darwin-arm64"
                sha256 "{checksums['menu-app-darwin-arm64']}"

                define_method(:install) do
                  bin.install "menu-app-darwin-arm64" => "menu-app"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/kevinpinscoe/tools/releases/download/{tag}/menu-app-linux-amd64"
                sha256 "{checksums['menu-app-linux-amd64']}"
                define_method(:install) do
                  bin.install "menu-app-linux-amd64" => "menu-app"
                end
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/kevinpinscoe/tools/releases/download/{tag}/menu-app-linux-arm64"
                sha256 "{checksums['menu-app-linux-arm64']}"
                define_method(:install) do
                  bin.install "menu-app-linux-arm64" => "menu-app"
                end
              end
            end

            test do
              system "#{{bin}}/menu-app", "--help"
            end
          end
          ''')
          else:
              text = path.read_text()
              text = re.sub(r'version "[^"]+"', f'version "{version}"', text, count=1)

              lines = text.splitlines()
              out = []
              i = 0
              while i < len(lines):
                  line = lines[i]
                  m = re.search(r'/download/[^/]+/(' + re.escape(tool) + r'-\S+)"', line)
                  if m and 'url "' in line:
                      binname = m.group(1)
                      sha = checksums.get(binname)
                      line = re.sub(
                          r'/download/[^/]+/' + re.escape(binname) + '"',
                          f'/download/{tag}/{binname}"',
                          line,
                      )
                      out.append(line)
                      i += 1
                      if sha and i < len(lines) and 'sha256 "' in lines[i]:
                          out.append(re.sub(r'sha256 "[^"]+"', f'sha256 "{sha}"', lines[i]))
                          i += 1
                      continue
                  out.append(line)
                  i += 1

              path.write_text("\n".join(out) + "\n")
          PYEOF
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/menu-app.rb"
          git diff --cached --quiet || git commit -m "menu-app ${VERSION}"
          git push
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
