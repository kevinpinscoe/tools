name: Release menu-app

on:
  push:
    tags:
      - 'menu-app-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: menu-app-source/go.mod

      - name: Build binaries
        working-directory: menu-app-source
        run: |
          VERSION="${GITHUB_REF_NAME#menu-app-}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          GOOS=linux  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o menu-app-linux-amd64  .
          GOOS=linux  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o menu-app-linux-arm64  .
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o menu-app-darwin-arm64 .
          sha256sum \
            menu-app-linux-amd64 \
            menu-app-linux-arm64 \
            menu-app-darwin-arm64 \
            > checksums.txt

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksums
        working-directory: menu-app-source
        run: |
          cosign sign-blob --yes \
            --bundle checksums.txt.bundle \
            checksums.txt

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            menu-app-source/menu-app-linux-amd64
            menu-app-source/menu-app-linux-arm64
            menu-app-source/menu-app-darwin-arm64
            menu-app-source/checksums.txt
            menu-app-source/checksums.txt.bundle
