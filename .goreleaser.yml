# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

builds:
  - id: check-git-repos
    dir: check-git-repos-source
    binary: check-git-repos
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags: [-s -w]
    env: [CGO_ENABLED=0]

  - id: check-git-branch
    dir: check-git-branch-source
    binary: check-git-branch
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags: [-s -w]
    env: [CGO_ENABLED=0]

  - id: pause
    dir: pause-source
    binary: pause
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags: [-s -w]
    env: [CGO_ENABLED=0]

archives:
  - id: tools-binaries
    builds: [check-git-repos, check-git-branch, pause]
    name_template: "{{ .Binary }}-{{ .Os }}-{{ .Arch }}"
    format: binary

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: checksum
    certificate: ${artifact}.pem
    signature: ${artifact}.sig
    output: true

release:
  github:
    owner: kevinpinscoe
    name: tools
  name_template: "v{{ .Version }}"
  make_latest: true
  generate_release_notes: true
