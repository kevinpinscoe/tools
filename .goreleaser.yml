# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

builds:
  - id: check-git-repos
    dir: check-git-repos-source
    binary: check-git-repos
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags: [-s -w]
    env: [CGO_ENABLED=0]

  - id: check-git-branch
    dir: check-git-branch-source
    binary: check-git-branch
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags: [-s -w]
    env: [CGO_ENABLED=0]

  - id: pause
    dir: pause-source
    binary: pause
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags: [-s -w]
    env: [CGO_ENABLED=0]

  - id: menu-app
    dir: menu-app-source
    binary: menu-app
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags: [-s -w -X main.version={{ .Version }}]
    env: [CGO_ENABLED=0]

archives:
  - id: check-git-repos-binary
    builds: [check-git-repos]
    name_template: "check-git-repos-{{ .Os }}-{{ .Arch }}"
    format: binary

  - id: check-git-branch-binary
    builds: [check-git-branch]
    name_template: "check-git-branch-{{ .Os }}-{{ .Arch }}"
    format: binary

  - id: pause-binary
    builds: [pause]
    name_template: "pause-{{ .Os }}-{{ .Arch }}"
    format: binary

  - id: menu-app-binary
    builds: [menu-app]
    name_template: "menu-app-{{ .Os }}-{{ .Arch }}"
    format: binary


nfpms:
  - id: check-git-repos-packages
    package_name: check-git-repos
    vendor: Kevin P. Inscoe
    homepage: https://github.com/kevinpinscoe/tools
    maintainer: Kevin P. Inscoe <kevin.inscoe@gmail.com>
    description: Check git repositories for uncommitted or unpushed changes
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    builds: [check-git-repos]

  - id: check-git-branch-packages
    package_name: check-git-branch
    vendor: Kevin P. Inscoe
    homepage: https://github.com/kevinpinscoe/tools
    maintainer: Kevin P. Inscoe <kevin.inscoe@gmail.com>
    description: Check git branch status across repositories
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    builds: [check-git-branch]

  - id: pause-packages
    package_name: pause
    vendor: Kevin P. Inscoe
    homepage: https://github.com/kevinpinscoe/tools
    maintainer: Kevin P. Inscoe <kevin.inscoe@gmail.com>
    description: Pause terminal output until a keypress
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    builds: [pause]

  - id: menu-app-packages
    package_name: menu-app
    vendor: Kevin P. Inscoe
    homepage: https://github.com/kevinpinscoe/tools
    maintainer: Kevin P. Inscoe <kevin.inscoe@gmail.com>
    description: Run repository scripts from a simple TUI menu
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    builds: [menu-app]

brews:
  - name: check-git-repos
    ids: [check-git-repos-binary]
    repository:
      owner: kevinpinscoe
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/kevinpinscoe/tools
    description: Check git repositories for uncommitted or unpushed changes
    license: MIT
    test: |
      system "#{bin}/check-git-repos", "--help"

  - name: check-git-branch
    ids: [check-git-branch-binary]
    repository:
      owner: kevinpinscoe
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/kevinpinscoe/tools
    description: Check git branch status across repositories
    license: MIT
    test: |
      system "#{bin}/check-git-branch", "--help"

  - name: pause
    ids: [pause-binary]
    repository:
      owner: kevinpinscoe
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/kevinpinscoe/tools
    description: Pause terminal output until a keypress
    license: MIT
    test: |
      system "#{bin}/pause", "--help"

  - name: menu-app
    ids: [menu-app-binary]
    repository:
      owner: kevinpinscoe
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/kevinpinscoe/tools
    description: Run repository scripts from a simple TUI menu
    license: MIT
    test: |
      system "#{bin}/menu-app", "--help"

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

release:
  github:
    owner: kevinpinscoe
    name: tools
  name_template: "v{{ .Version }}"
  make_latest: true
