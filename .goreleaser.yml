# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

builds:
  - id: check-git-repos
    dir: check-git-repos-source
    binary: check-git-repos
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags: [-s -w]
    env: [CGO_ENABLED=0]

  - id: check-git-branch
    dir: check-git-branch-source
    binary: check-git-branch
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags: [-s -w]
    env: [CGO_ENABLED=0]

  - id: pause
    dir: pause-source
    binary: pause
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags: [-s -w]
    env: [CGO_ENABLED=0]

archives:
  - id: tools-binaries
    builds: [check-git-repos, check-git-branch, pause]
    name_template: "{{ .Binary }}-{{ .Os }}-{{ .Arch }}"
    format: binary


nfpms:
  - id: check-git-repos-packages
    package_name: check-git-repos
    vendor: Kevin P. Inscoe
    homepage: https://github.com/kevinpinscoe/tools
    maintainer: Kevin P. Inscoe <kevin.inscoe@gmail.com>
    description: Check git repositories for uncommitted or unpushed changes
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    builds: [check-git-repos]

  - id: check-git-branch-packages
    package_name: check-git-branch
    vendor: Kevin P. Inscoe
    homepage: https://github.com/kevinpinscoe/tools
    maintainer: Kevin P. Inscoe <kevin.inscoe@gmail.com>
    description: Check git branch status across repositories
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    builds: [check-git-branch]

  - id: pause-packages
    package_name: pause
    vendor: Kevin P. Inscoe
    homepage: https://github.com/kevinpinscoe/tools
    maintainer: Kevin P. Inscoe <kevin.inscoe@gmail.com>
    description: Pause terminal output until a keypress
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    builds: [pause]

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: checksum
    certificate: ${artifact}.pem
    signature: ${artifact}.sig
    output: true

release:
  github:
    owner: kevinpinscoe
    name: tools
  name_template: "v{{ .Version }}"
  make_latest: true
